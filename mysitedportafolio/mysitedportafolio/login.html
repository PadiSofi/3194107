<h2>Login</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Usuario"><br>
    <input type="password" name="password" placeholder="Contraseña"><br>
    <button type="submit">Ingresar</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
